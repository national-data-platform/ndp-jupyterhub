    extraConfig:

      default.py: |
# spawner_local.py code here

  # proxy:
  #   secretToken: ""  # Generate with: openssl rand -hex 32
  #   service:
  #     type: ClusterIP
  #   chp:
  #     resources:
  #       limits:
  #         cpu: "1"
  #         memory: 1Gi
  #       requests:
  #         cpu: 200m
  #         memory: 512Mi

  proxy:
    service:
      type: NodePort
      nodePorts:
        http: 30080

  singleuser:
    uid: 1000
    fsGid: 100
    allowPrivilegeEscalation: true
    extraPodConfig:
      securityContext:
          fsGroupChangePolicy: "OnRootMismatch"
    cloudMetadata:
      blockWithIptables: false
    networkPolicy:
      enabled: false
    initContainers:
    - name: volume-permissions
      image: busybox
      command: ["sh", "-c", "chmod 777 -R /home/jovyan/work/_User-Persistent-Storage_CephBlock_"]
      volumeMounts:
        - mountPath: /home/jovyan/work/_User-Persistent-Storage_CephBlock_
          name: volume-ceph-bw-{username}
    storage:
      extraLabels: {}
      capacity: 2Gi
      homeMountPath: /home/jovyan/work/_User-Persistent-Storage_CephBlock_
      dynamic:
        storageClass: standard
        pvcNameTemplate: claim-ceph-bw-{username}
        volumeNameTemplate: volume-ceph-bw-{username}
        storageAccessModes: [ReadWriteOnce]

    image:
      name: gitlab-registry.nrp-nautilus.io/ndp/ndp-docker-images/jhub-spawn
      tag: minimal_0.0.10
    startTimeout: 300
    cpu:
      limit: 1
      guarantee: 1
    memory:
      limit: 2G
      guarantee: 
    extraResource:
      limits: {}
      guarantees: {}
    cmd: jupyterhub-singleuser
    defaultUrl: "/lab"

  scheduling:
    userScheduler:
      enabled: false
    userPlaceholder:
      enabled: false
  # prePuller relates to the hook|continuous-image-puller DaemonsSets
  prePuller:
    hook:
      enabled: false
    continuous:
      enabled: false

  # ingress:
  #   enabled: true
  #   annotations:
  #     kubernetes.io/ingress.class: haproxy
  #   hosts: ["ndp-test-jupyterhub.nrp-nautilus.io"]
  #   pathSuffix: ''
  #   tls:
  #     - hosts:
  #       - ndp-test-jupyterhub.nrp-nautilus.io
  ingress:
    enabled: false

  cull:
    enabled: true
    users: false
    removeNamedServers: false
    timeout: 3600
    every: 600
    concurrency: 10
    maxAge: 0