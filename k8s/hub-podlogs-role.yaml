# kubectl apply -f hub-podlogs-role.yaml

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-podlogs
  namespace: ndp-test
rules:
- apiGroups: [""]
  resources:
  - pods/log
  verbs:
  - get
  - watch
  - list

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-podlogs
  namespace: ndp-test
subjects:
- kind: ServiceAccount
  name: hub
  namespace: ndp-test
roleRef:
  kind: Role
  name: hub-podlogs
  apiGroup: rbac.authorization.k8s.io
